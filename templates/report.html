<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Form Detect Report</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: 'Segoe UI', system-ui, sans-serif;
            background: #0d1117;
            color: #e6edf3;
            min-height: 100vh;
            padding: 40px 20px;
        }
        .container { max-width: 920px; margin: 0 auto; }
        header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 32px;
            padding-bottom: 20px;
            border-bottom: 1px solid #30363d;
        }
        header h1 { font-size: 1.6rem; color: #58a6ff; }
        header h1 span { color: #3fb950; }
        .author { color: #8b949e; font-size: 0.85rem; }
        .meta-bar {
            background: #161b22;
            border: 1px solid #30363d;
            border-radius: 10px;
            padding: 16px 20px;
            margin-bottom: 28px;
            display: flex;
            gap: 32px;
            flex-wrap: wrap;
            font-size: 0.9rem;
        }
        .meta-bar .kv { display: flex; flex-direction: column; gap: 4px; }
        .meta-bar .kv label { color: #8b949e; font-size: 0.75rem; text-transform: uppercase; letter-spacing: .06em; }
        .meta-bar .kv span { color: #e6edf3; font-weight: 600; }
        .empty-notice {
            background: #161b22;
            border: 1px dashed #30363d;
            border-radius: 10px;
            padding: 40px;
            text-align: center;
            color: #6e7681;
            font-size: 0.95rem;
        }
        .form-card {
            background: #161b22;
            border: 1px solid #30363d;
            border-radius: 12px;
            margin-bottom: 24px;
            overflow: hidden;
        }
        .form-card-header {
            background: #1f2937;
            padding: 14px 20px;
            display: flex;
            align-items: center;
            gap: 12px;
            border-bottom: 1px solid #30363d;
        }
        .badge {
            background: #388bfd22;
            color: #58a6ff;
            border: 1px solid #388bfd55;
            padding: 3px 10px;
            border-radius: 20px;
            font-size: 0.73rem;
            font-weight: 700;
            letter-spacing: .08em;
        }
        .form-url { color: #8b949e; font-size: 0.84rem; word-break: break-all; }
        .form-meta {
            display: flex;
            border-bottom: 1px solid #30363d;
        }
        .meta-cell {
            flex: 1;
            padding: 12px 20px;
            display: flex;
            flex-direction: column;
            gap: 4px;
            border-right: 1px solid #30363d;
        }
        .meta-cell:last-child { border-right: none; }
        .meta-cell .cell-label { color: #8b949e; font-size: 0.75rem; text-transform: uppercase; letter-spacing: .06em; }
        .meta-cell .cell-value { color: #3fb950; font-weight: 600; font-size: 0.93rem; }
        .meta-cell .cell-value.null { color: #6e7681; font-style: italic; font-weight: 400; }
        table { width: 100%; border-collapse: collapse; }
        thead tr { background: #21262d; }
        th {
            padding: 10px 20px;
            text-align: left;
            color: #8b949e;
            font-size: 0.75rem;
            text-transform: uppercase;
            letter-spacing: .06em;
            border-bottom: 1px solid #30363d;
        }
        td {
            padding: 10px 20px;
            font-size: 0.87rem;
            border-bottom: 1px solid #21262d;
        }
        tr:last-child td { border-bottom: none; }
        tr:hover td { background: #1c2128; }
        td.null { color: #6e7681; font-style: italic; }
        .no-inputs { padding: 16px 20px; color: #6e7681; font-style: italic; font-size: 0.87rem; }
        footer {
            text-align: center;
            margin-top: 40px;
            color: #8b949e;
            font-size: 0.78rem;
        }
    </style>
</head>
<body>
<div class="container">
    <header>
        <h1>Form Detect <span>Report</span></h1>
        <span class="author">Coded by Umut Özen</span>
    </header>

    <div class="meta-bar">
        <div class="kv"><label>Target URL</label><span>{{URL}}</span></div>
        <div class="kv"><label>Forms Found</label><span>{{FORM_COUNT}}</span></div>
        <div class="kv"><label>Scanned At</label><span>{{SCAN_DATE}}</span></div>
    </div>

    {{FORMS_BODY}}

    <footer>Form Detect &mdash; {{SCAN_DATE}}</footer>
</div>
</body>
</html>
